name: 🤖 38커뮤니케이션 IPO 일정 자동 수집 파이프라인

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰️ 레포지토리 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 🐍 파이썬 3.11 환경 셋업
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 파이썬 라이브러리 종속성 설치
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests google-cloud-firestore urllib3

    # 💡 [보안 완벽 검증] 주입할 때 파일명 양끝에 투명 공백이나 누수가 생기지 않도록 가공 처리
    - name: 🔑 파이어베이스 서비스 계정 보안 키 주입
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" > stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json
        if [ ! -s stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json ]; then
          echo "❌ 에러: GitHub Secrets 키 주입 실패. 파일이 비어있습니다."
          exit 1
        fi

    - name: 🚀 주식 크롤러 배치 스크립트 실행
      run: |
        python main.py